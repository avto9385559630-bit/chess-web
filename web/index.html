<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Шахматы для детей</title>
<style>
  body {
    font-family: Arial;
    display: flex;
    justify-content: center;
    margin-top: 40px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-template-rows: repeat(8, 60px);
    border: 4px solid #333;
  }

  .cell {
    width: 60px;
    height: 60px;
    font-size: 36px;
    text-align: center;
    line-height: 60px;
    cursor: pointer;
  }

  .white { background: #f0d9b5; }
  .black { background: #b58863; }

  .selected {
    outline: 3px solid red;
  }
</style>
</head>
<body>

<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");

const pieces = [
  "♜","♞","♝","♛","♚","♝","♞","♜",
  "♟","♟","♟","♟","♟","♟","♟","♟",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "♙","♙","♙","♙","♙","♙","♙","♙",
  "♖","♘","♗","♕","♔","♗","♘","♖"
];

let selected = null;

function drawBoard() {
  board.innerHTML = "";
  for (let i = 0; i < 64; i++) {
    const cell = document.createElement("div");
    cell.className = "cell " + ((Math.floor(i / 8) + i) % 2 ? "black" : "white");
    cell.innerText = pieces[i];
    cell.dataset.index = i;

    cell.onclick = () => clickCell(i, cell);
    board.appendChild(cell);
  }
}

function clickCell(i, cell) {
  if (selected === null && pieces[i] !== "") {
    selected = i;
    cell.classList.add("selected");
  } else if (selected !== null) {
    pieces[i] = pieces[selected];
    pieces[selected] = "";
    selected = null;
    drawBoard();
  }
}

drawBoard();
</script>

</body>
</html>
